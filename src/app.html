<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
		<title>Lextension - Word Bridge Puzzle</title>
		<meta name="description" content="Bridge between two words using word relationships. Fewer hops = higher score!" />
		<script>
			(function () {
				try {
					var raw = localStorage.getItem('site_theme');
					var choice = raw ? JSON.parse(raw) : 'system';
					var resolved =
						choice === 'system'
							? window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light'
							: choice;
					if (resolved === 'dark') document.documentElement.classList.add('dark');
					document.documentElement.dataset.theme = choice;
				} catch (e) {}
			})();
		</script>
		<script>
			// Set puzzle_date cookie to local YYYY-MM-DD before SvelteKit hydrates
			// so daily-puzzle server loads resolve against the user's local calendar day.
			(function () {
				try {
					var d = new Date();
					var iso =
						d.getFullYear() +
						'-' +
						String(d.getMonth() + 1).padStart(2, '0') +
						'-' +
						String(d.getDate()).padStart(2, '0');
					document.cookie =
						'puzzle_date=' + iso + '; Path=/; Max-Age=86400; SameSite=Lax';
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
