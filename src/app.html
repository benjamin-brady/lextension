<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
		<link rel="canonical" href="https://lextension.net/" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
		<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<title>Lextension - Word Bridge Puzzle</title>
		<meta
			name="description"
			content="Build a path from one word to another by changing the word step by step. Each move has to create a valid new word that gets you closer to the target. Play the Daily Chain, Daily Fib, or random practice rounds."
		/>
		<meta name="application-name" content="Lextension" />
		<meta name="theme-color" content="#f6eddc" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Lextension" />
		<meta property="og:title" content="Lextension - Word Bridge Puzzle" />
		<meta
			property="og:description"
			content="Build a path from one word to another by changing the word step by step. Each move has to create a valid new word that gets you closer to the target. Play the Daily Chain, Daily Fib, or random practice rounds."
		/>
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:url" content="https://lextension.net/" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Lextension - Word Bridge Puzzle" />
		<meta
			name="twitter:description"
			content="Build a path from one word to another by changing the word step by step. Each move has to create a valid new word that gets you closer to the target. Play the Daily Chain, Daily Fib, or random practice rounds."
		/>
		<script>
			(function () {
				try {
					var raw = localStorage.getItem('site_theme');
					var choice = raw ? JSON.parse(raw) : 'system';
					var resolved =
						choice === 'system'
							? window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light'
							: choice;
					if (resolved === 'dark') document.documentElement.classList.add('dark');
					document.documentElement.dataset.theme = choice;
				} catch (e) {}
			})();
		</script>
		<script>
			// Set puzzle_date cookie to local YYYY-MM-DD before SvelteKit hydrates
			// so daily-puzzle server loads resolve against the user's local calendar day.
			(function () {
				try {
					var d = new Date();
					var iso =
						d.getFullYear() +
						'-' +
						String(d.getMonth() + 1).padStart(2, '0') +
						'-' +
						String(d.getDate()).padStart(2, '0');
					document.cookie =
						'puzzle_date=' + iso + '; Path=/; Max-Age=86400; SameSite=Lax';
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
